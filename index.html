<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Online Photobooth: Dua Orang dalam Satu Frame</title>
    <!-- CSS Eksternal -->
    <link rel="stylesheet" href="style.css">
    <!-- Library Pihak Ketiga (Wajib HTTPS) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div class="container">
    <h1>VAR</h1>
    <p>Hubungkan, Potong Latar, dan Foto Bareng Jarak Jauh</p>

    <!-- Kontrol Koneksi P2P -->
    <div class="controls">
        <h3>1. Koneksi Device</h3>
        <p>ID Device Anda: <span id="my-id">Menghubungkan server...</span></p>
        <input type="text" id="peer-id-input" placeholder="Masukkan 8 Digit ID Teman">
        <button type="button" class="secondary" id="btn-call">Hubungkan & Panggil</button>
        <div class="status" id="connection-status">Belum terhubung ke device lain.</div>
    </div>

    <!-- Area Komposit (Panggung Utama) -->
    <div class="composite-zone">
        <h3>2. Area Foto Gabungan</h3>
        <p>Kalian berdua bertemu di sini secara real-time!</p>
        <div class="camera-stage">
            <h2 id="countdown"></h2>
            <canvas id="canvas-composite" width="1280" height="720"></canvas>
        </div>
        <div class="shutter-controls controls">
            <p>Pemegang Kendali Sesi: <span id="current-controller">Lokal (Anda)</span></p>
            <button type="button" id="btn-snap">Ambil Foto Berdua (3x)</button>
            <button type="button" class="secondary" id="btn-pass">Lempar Kendali</button>
        </div>
    </div>

    <!-- Area Buffer Latar Belakang AI (Disembunyikan dari display) -->
    <div class="previews-zone" style="display:none;">
        <video id="video-local" autoplay playsinline></video>
        <canvas id="canvas-local" width="640" height="480"></canvas>
        <video id="video-remote" autoplay playsinline></video>
        <canvas id="canvas-remote" width="640" height="480"></canvas>
    </div>

    <!-- Hasil Akhir Kartu Photobooth -->
    <div class="result-zone">
        <h3>3. Hasil Kartu Foto Berdua</h3>
        <canvas id="photos-strip" width="440" height="1100"></canvas>
        <br>
        <button type="button" id="btn-download">Unduh Kartu (PNG Transparan)</button>
    </div>
</div>

<!-- Logika Utama -->
<script src="app.js"></script>
</body>
</html>
